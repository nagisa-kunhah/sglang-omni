# ASR CI threshold calibration (shared omni venv).
#
# CI DAG:
#   stage-1-multi-speaker (MOSS-Transcribe-Diarize on movies800time + AISHELL4 long)
#   -> stage-2-seedtts (Fun-ASR-Nano on SeedTTS EN and ZH)
#
# All stages use the managed router with 2 single-GPU workers (DP=2).
name: asr
description: "ASR CI (MOSS-TD multi-speaker + Fun-ASR SeedTTS)"
hf_model_id: "OpenMOSS-Team/MOSS-Transcribe-Diarize"
hf_model_ids_by_test:
  test_asr_ci_multi_speaker.py:
    - "OpenMOSS-Team/MOSS-Transcribe-Diarize"
  test_asr_ci_fun_asr.py:
    - "FunAudioLLM/Fun-ASR-Nano-2512-hf"
hf_datasets:
  - "zhaochenyang20/movies800time"
  - "zhaochenyang20/AISHELL4"
  - "zhaochenyang20/seed-tts-eval-arrow"
omni_ci_home: "/github/home/calibration"
default_venv_python:
  # H100 CI calibration venv (first match wins).
  - "/github/home/calibration/omni/bin/python"
  - "/sgl-workspace/sglang-omni/omni/bin/python"
  - "/github/home/omni/bin/python"
auto_env:
  HOME: "/github/home"
  OMNI_CI_HOME: "/github/home/calibration"
  HF_HOME: "/github/home/.cache/huggingface"
  XDG_CACHE_HOME: "/github/home/calibration/.cache"
  HF_ENDPOINT: "https://huggingface.co"
  HF_HUB_DISABLE_XET: "0"
  UV_INDEX_URL: "https://mirrors.aliyun.com/pypi/simple"
  UV_CACHE_DIR: "/github/home/.cache/uv"
  TORCHINDUCTOR_CACHE_DIR: "/github/home/calibration/.torchinductor"
  FLASHINFER_DISABLE_VERSION_CHECK: "1"
  SEEDTTS_SIM_CACHE_DIR: "/github/home/seedtts-wavlm-sim"
gpus_per_test:
  test_asr_ci_multi_speaker.py: 2
  test_asr_ci_fun_asr.py: 2
test_globs:
  - "tests/test_model/test_asr_ci_multi_speaker.py"
  - "tests/test_model/test_asr_ci_fun_asr.py"
extra_env: {}
pytest_extra_args: {}
stage_base_strip_prefix: "test_asr_ci_"
metric_sources:
  test_asr_ci_multi_speaker.py:
    json_file: "test_moss_transcribe_diarize_m0/moss_transcribe_diarize_results.json"
    sample_counts:
      total: "summary.total_samples"
      ok: "summary.evaluated"
    paths:
      cer_percent: "diarization_metrics_percent.cer"
      cer_no_spk_percent: "diarization_metrics_percent.cer_no_spk"
      cp_cer_percent: "diarization_metrics_percent.cp_cer"
      cer_no_spk_cp_valid_percent: "diarization_metrics_percent.cer_no_spk_cp_valid"
      delta_cer_percent: "diarization_metrics_percent.delta_cer"
      speaker_timestamp_der_percent: "diarization_metrics_percent.speaker_timestamp_der"
      cer_no_spk_below_50_corpus: "diarization_metrics_percent.cer_no_spk_below_50_corpus"
      n_above_50_pct_cer: "diarization_metrics_percent.n_above_50_pct_cer"
      cer_valid_samples: "diarization_metrics_percent.cer_valid_samples"
      cp_cer_valid_samples: "diarization_metrics_percent.cp_cer_valid_samples"
      throughput_qps: "speed.throughput_qps"
      latency_mean_s: "speed.latency_mean_s"
      latency_p95_s: "speed.latency_p95_s"
      rtf_mean: "speed.rtf_mean"
      rtf_p95: "speed.rtf_p95"
    variants:
      movies800:
        stage_base_override: multi_speaker
        omit_variant_suffix: true
        constant_filter: "^MOSS_TD_(?!STREAM_|AISHELL4).*"
        json_file: "test_moss_transcribe_diarize_m0/moss_transcribe_diarize_results.json"
        sample_counts:
          total: "summary.total_samples"
          ok: "summary.evaluated"
        paths:
          cer_percent: "diarization_metrics_percent.cer"
          cer_no_spk_percent: "diarization_metrics_percent.cer_no_spk"
          cp_cer_percent: "diarization_metrics_percent.cp_cer"
          cer_no_spk_cp_valid_percent: "diarization_metrics_percent.cer_no_spk_cp_valid"
          delta_cer_percent: "diarization_metrics_percent.delta_cer"
          speaker_timestamp_der_percent: "diarization_metrics_percent.speaker_timestamp_der"
          cer_no_spk_below_50_corpus: "diarization_metrics_percent.cer_no_spk_below_50_corpus"
          n_above_50_pct_cer: "diarization_metrics_percent.n_above_50_pct_cer"
          cer_valid_samples: "diarization_metrics_percent.cer_valid_samples"
          cp_cer_valid_samples: "diarization_metrics_percent.cp_cer_valid_samples"
          throughput_qps: "speed.throughput_qps"
          latency_mean_s: "speed.latency_mean_s"
          latency_p95_s: "speed.latency_p95_s"
          rtf_mean: "speed.rtf_mean"
          rtf_p95: "speed.rtf_p95"
      aishell4_long:
        stage_base_override: aishell4_long
        omit_variant_suffix: true
        constant_filter: "^AISHELL4_LONG_"
        context_vars:
          - MOSS_TD_AISHELL4_LONG_CI_SAMPLES
        json_file: "test_moss_transcribe_diarize_m0/moss_transcribe_diarize_aishell4_long_results.json"
        sample_counts:
          total: "summary.total_samples"
          ok: "summary.evaluated"
        paths:
          cer_percent: "diarization_metrics_percent.cer"
          cer_no_spk_percent: "diarization_metrics_percent.cer_no_spk"
          cp_cer_percent: "diarization_metrics_percent.cp_cer"
          delta_cer_percent: "diarization_metrics_percent.delta_cer"
          speaker_timestamp_der_percent: "diarization_metrics_percent.speaker_timestamp_der"
          throughput_qps: "speed.throughput_qps"
          latency_mean_s: "speed.latency_mean_s"
          latency_p95_s: "speed.latency_p95_s"
          rtf_mean: "speed.rtf_mean"
          rtf_p95: "speed.rtf_p95"
      stream:
        constant_filter: "^MOSS_TD_STREAM_"
        context_vars:
          - MOSS_TD_CI_SAMPLES
        json_file: "test_moss_transcribe_diarize_m0/moss_transcribe_diarize_stream_results.json"
        sample_counts:
          total: "summary.total_samples"
          ok: "summary.evaluated"
        paths:
          cer_percent: "diarization_metrics_percent.cer"
          cer_no_spk_percent: "diarization_metrics_percent.cer_no_spk"
          cp_cer_percent: "diarization_metrics_percent.cp_cer"
          cer_no_spk_cp_valid_percent: "diarization_metrics_percent.cer_no_spk_cp_valid"
          delta_cer_percent: "diarization_metrics_percent.delta_cer"
          speaker_timestamp_der_percent: "diarization_metrics_percent.speaker_timestamp_der"
          cer_no_spk_below_50_corpus: "diarization_metrics_percent.cer_no_spk_below_50_corpus"
          n_above_50_pct_cer: "diarization_metrics_percent.n_above_50_pct_cer"
          cer_valid_samples: "diarization_metrics_percent.cer_valid_samples"
          cp_cer_valid_samples: "diarization_metrics_percent.cp_cer_valid_samples"
          throughput_qps: "speed.throughput_qps"
          latency_mean_s: "speed.latency_mean_s"
          latency_p95_s: "speed.latency_p95_s"
          rtf_mean: "speed.rtf_mean"
          rtf_p95: "speed.rtf_p95"
          text_ttft_p95_s: "speed.text_ttft_p95_s"
          inter_chunk_p95_s: "speed.inter_chunk_p95_s"
  test_asr_ci_fun_asr.py:
    variants:
      en:
        constant_filter: "^FUN_ASR_(?!ZH_).*"
        context_vars:
          - SEEDTTS_FUN_ASR_EN_SAMPLES
        json_file: "fun_asr_results.json"
        sample_counts:
          total: "summary.total_samples"
          ok: "summary.evaluated"
        paths:
          corpus_wer: "summary.corpus_wer"
          per_sample_wer_max: "summary.wer_per_sample_max"
          throughput_qps: "speed.throughput_samples_per_s"
          latency_mean_s: "speed.latency_mean_s"
          latency_p95_s: "speed.latency_p95_s"
          rtf_mean: "speed.rtf_mean"
          rtf_p95: "speed.rtf_p95"
      zh:
        constant_filter: "^FUN_ASR_ZH_"
        context_vars:
          - SEEDTTS_FUN_ASR_ZH_SAMPLES
        json_file: "fun_asr_zh_results.json"
        sample_counts:
          total: "summary.total_samples"
          ok: "summary.evaluated"
        paths:
          corpus_wer: "summary.corpus_wer"
          per_sample_wer_max: "summary.wer_per_sample_max"
